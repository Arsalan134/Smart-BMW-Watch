; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc1-n16r8]
; Use the pioarduino fork to get arduino-esp32 3.x (IDF 5.x). This is REQUIRED:
; only IDF 5.x esp_lcd exposes flags.quad_mode, which the ST77916 QSPI panel
; needs to drive all 4 data lines. The official espressif32 platform ships
; arduino-esp32 2.0.17 (IDF 4.4) whose esp_lcd has only octal_mode, so the
; panel renders only a partial/garbled frame.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
upload_port = COM8
monitor_port = COM8
monitor_speed = 115200
board_build.flash_size = 16MB
board_build.psram_type = opi
board_upload.flash_size = 16MB
build_flags = 
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	-DBOARD_HAS_PSRAM
	-DCORE_DEBUG_LEVEL=0
	-Isrc
board_build.partitions = huge_app.csv
extra_scripts = pre:extra_script.py
lib_deps = 
	lvgl/lvgl@^9.5.0
	; https://github.com/schreibfaul1/ESP32-audioI2S.git
